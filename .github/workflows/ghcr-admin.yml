# Construye y publica la imagen de apps/admin en GitHub Container Registry.
# Imagen: ghcr.io/bibliotecaven/mppd-gcs-admin
#
# --- Variables VITE compartidas (definir una vez en el repo; usan web/admin/space) ---
#   VITE_API_BASE_URL          URL pública del API (ej. https://api.tudominio.com)
#   VITE_API_BASE_PATH         Ruta del API (default en Dockerfile: /api)
#   VITE_WEB_BASE_URL          URL pública de la app web
#   VITE_WEB_BASE_PATH         Ruta base de web (default "")
#   VITE_ADMIN_BASE_URL        URL pública del admin (nginx + /god-mode)
#   VITE_ADMIN_BASE_PATH       /god-mode
#   VITE_SPACE_BASE_URL        URL pública de space
#   VITE_SPACE_BASE_PATH       /spaces
#   VITE_LIVE_BASE_URL         URL pública de live
#   VITE_LIVE_BASE_PATH        /live
#   VITE_WEBSITE_URL           (opcional) marca sitio; default plane.so en Dockerfile
#   VITE_SUPPORT_EMAIL         (opcional) email soporte; default en Dockerfile
#
# Mismos requisitos de token que ghcr-api.yml (write:packages).
# Rebuild: 2026-04-09 — disparar imagen tras actualizar variables en GitHub.

name: GHCR — Admin

on:
  push:
    branches:
      - preview
      - main
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ghcr-admin.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bibliotecaven/mppd-gcs-admin

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile.admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_API_BASE_PATH=${{ vars.VITE_API_BASE_PATH || '/api' }}
            VITE_WEB_BASE_URL=${{ vars.VITE_WEB_BASE_URL }}
            VITE_WEB_BASE_PATH=${{ vars.VITE_WEB_BASE_PATH }}
            VITE_ADMIN_BASE_URL=${{ vars.VITE_ADMIN_BASE_URL }}
            VITE_ADMIN_BASE_PATH=${{ vars.VITE_ADMIN_BASE_PATH || '/god-mode' }}
            VITE_SPACE_BASE_URL=${{ vars.VITE_SPACE_BASE_URL }}
            VITE_SPACE_BASE_PATH=${{ vars.VITE_SPACE_BASE_PATH || '/spaces' }}
            VITE_LIVE_BASE_URL=${{ vars.VITE_LIVE_BASE_URL }}
            VITE_LIVE_BASE_PATH=${{ vars.VITE_LIVE_BASE_PATH || '/live' }}
            VITE_WEBSITE_URL=${{ vars.VITE_WEBSITE_URL || 'https://plane.so' }}
            VITE_SUPPORT_EMAIL=${{ vars.VITE_SUPPORT_EMAIL || 'support@plane.so' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
