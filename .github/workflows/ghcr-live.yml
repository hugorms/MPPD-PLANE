# Construye y publica la imagen de apps/live en GitHub Container Registry.
# Imagen: ghcr.io/bibliotecaven/ghp-gcs-live
#
# apps/live no usa VITE en build: servidor Node (process.env en runtime).
# En Dokploy/deploy: API_BASE_URL, LIVE_SERVER_SECRET_KEY, REDIS_*, PORT, etc.
# Ver apps/live/.env.example y apps/live/src/env.ts
#
# Mismos requisitos de token que ghcr-api.yml (write:packages).
# Rebuild: 2026-04-09 — disparar imagen tras actualizar variables en GitHub.

name: GHCR — Live

on:
  push:
    branches:
      - preview
      - main
    paths:
      - "apps/live/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ghcr-live.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bibliotecaven/ghp-gcs-live

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/live/Dockerfile.live
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
